[general]
static=yes
writeprotect=yes
clearglobalvars=no

[globals]
INBOUND_RING_SECONDS=45
OUTBOUND_CALL_SECONDS=120

[lab-users]
; Ring both registered lab phones.
exten => 6000,1,NoOp(Lab ring group from ${CALLERID(all)})
 same => n,Dial(PJSIP/6001&PJSIP/6002,${INBOUND_RING_SECONDS},tT)
 same => n,Hangup()

; Direct extension calls.
exten => 6001,1,Dial(PJSIP/6001,45,tT)
 same => n,Hangup()
exten => 6002,1,Dial(PJSIP/6002,45,tT)
 same => n,Hangup()

; Local media loopback for softphone RTP and codec validation.
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; Prefix 9 strips the access digit before sending the number to H.248.
exten => _9X.,1,Set(CARRIER_NUMBER=${EXTEN:1})
 same => n,Gosub(outbound-h248,s,1(${CARRIER_NUMBER}))
 same => n,Hangup()

[outbound-h248]
exten => s,1,NoOp(H.248 outside call to ${ARG1} from ${CALLERID(all)})
 same => n,Dial(PJSIP/${ARG1}@h248-gateway,${OUTBOUND_CALL_SECONDS},tT)
 same => n,Return()

[from-h248-gateway]
; The gateway's configured trunk URI is sip:6000@PBX:5062.
exten => 6000,1,Goto(lab-inbound,s,1)
exten => h248-line,1,Goto(lab-inbound,s,1)
exten => _X!,1,Goto(lab-inbound,s,1)

[lab-inbound]
exten => s,1,NoOp(H.248 carrier call from ${CALLERID(all)})
 same => n,Dial(PJSIP/6001&PJSIP/6002,${INBOUND_RING_SECONDS},tT)
 same => n,Hangup()
